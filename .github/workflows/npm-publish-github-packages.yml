name: Publish GitHub Package

on:
    release:
        types: [created]

permissions:
    contents: read
    packages: write
    id-token: write

jobs:
    publish-github-package:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: https://npm.pkg.github.com/
                  scope: "@arkitektum"

            # 👇 Ensure Yarn v4 from packageManager is used
            - name: Enable Corepack & activate Yarn 4
              run: |
                  corepack enable
                  corepack prepare yarn@4.10.3 --activate
                  yarn --version

            - run: yarn install --immutable
            - run: yarn test
            - run: yarn build

            - name: Determine dist-tag
              id: dist_tag
              run: |
                  TAG_NAME="${{ github.event.release.tag_name }}"
                  if [[ "$TAG_NAME" == *"-"* ]]; then
                    DIST_TAG=$(echo "$TAG_NAME" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
                  else
                    DIST_TAG="latest"
                  fi
                  echo "value=$DIST_TAG" >> $GITHUB_OUTPUT

            - name: Publish to GitHub Packages
              if: ${{ success() }}
              run: npm publish --tag ${{ steps.dist_tag.outputs.value }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}
